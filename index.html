    *{box-sizing:border-box}

    html, body{
      margin:0;
      padding:0;
      width:100%;
      min-height:100%;
      overflow-x:hidden;
      font-family:"Segoe UI", Arial, Tahoma, sans-serif;
      color:var(--text);
     
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    button{
      font-family:inherit;
    }

    a{color:inherit;text-decoration:none}
    img{display:block;width:100%;max-width:100%}

    .site-box{
      width:100%;
      min-height:100vh;
     
    }

    .wrap{
      width:min(1260px, 100%);
      margin:0 auto;
      padding:28px 26px 38px;
    }

    .hero{
      text-align:center;
      margin-bottom:26px;
    }

    .logo{
      width:116px;
      height:116px;
      margin:0 auto 16px;
      border-radius:50%;
      background:
        radial-gradient(circle at 50% 35%, rgba(255,255,255,.08), rgba(255,255,255,0) 45%),
        linear-gradient(180deg, rgba(0,0,0,.16), rgba(255,255,255,.03)),
        #153562;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.08) inset,
        0 0 38px rgba(117,168,255,.18),
        0 16px 36px rgba(0,0,0,.24);
      display:grid;
      place-items:center;
      overflow:hidden;
    }

    .logo-mark{
      text-align:center;
      line-height:1.05;
      transform:translateY(-2px);
    }

    .logo-flame{
      position:relative;
      width:42px;
      height:48px;
      margin:0 auto 6px;
    }

    .logo-flame::before,
    .logo-flame::after{
      content:"";
      position:absolute;
      border-radius:48% 52% 52% 48%;
      transform-origin:bottom center;
    }

    .logo-flame::before{
      width:20px;
      height:42px;
      left:9px;
      bottom:0;
      background:linear-gradient(180deg,#ffd66f,#ff982f);
      transform:skew(-10deg) rotate(18deg);
    }

    .logo-flame::after{
      width:15px;
      height:36px;
      right:7px;
      bottom:1px;
      background:linear-gradient(180deg,#4bd9ff,#178dff);
      transform:skew(8deg) rotate(22deg);
    }

    .logo-mark .name{
      color:#27a0ff;
      font-size:15px;
      font-weight:900;
      letter-spacing:.5px;
    }

    .logo-mark .small{
      color:#ffcc52;
      font-size:8px;
      font-weight:800;
      letter-spacing:.7px;
      text-transform:uppercase;
      margin-top:2px;
    }

    h1{
      margin:0;
      font-size:clamp(28px, 4vw, 58px);
      line-height:1.08;
      letter-spacing:1px;
      font-weight:900;
      text-transform:uppercase;
    }

    .sub{
      margin:10px 0 0;
      color:#e8f0ff;
      font-size:clamp(15px, 1.6vw, 26px);
      font-weight:600;
    }

    .view{
      display:none;
      animation:pageIn .28s ease both;
    }

    .view.active{
      display:block;
    }

    @keyframes pageIn{
      from{opacity:0; transform:translateY(8px)}
      to{opacity:1; transform:translateY(0)}
    }

    .album-page{
      display:none;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:24px;
      align-items:start;
      animation:pageIn .28s ease both;
    }

    .album-page.active{
      display:grid;
    }

    .album-card{
      position:relative;
      overflow:hidden;
      background:linear-gradient(180deg, rgba(87,112,151,.92), rgba(57,82,121,.96));
      border:1px solid rgba(255,255,255,.14);
      border-radius:24px;
      padding:16px 16px 14px;
      box-shadow:var(--shadow);
      transition:transform .24s ease, box-shadow .24s ease, background .24s ease, border-color .24s ease;
      cursor:pointer;
    }

    .album-card::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), transparent 26%),
        radial-gradient(circle at 20% 15%, rgba(255,255,255,.06), transparent 34%),
        radial-gradient(circle at 80% 85%, rgba(255,255,255,.05), transparent 34%);
      pointer-events:none;
    }

    .album-card:hover{
      transform:translateY(-6px);
      box-shadow:0 20px 48px rgba(0,0,0,.32);
      border-color:rgba(255,255,255,.22);
      background:linear-gradient(160deg, rgba(69,104,150,.98), rgba(57,88,133,.97) 48%, rgba(74,96,141,.98));
    }

    .media-shell{
      position:relative;
      z-index:1;
      padding:8px;
      border-radius:20px;
      background:linear-gradient(135deg, rgba(255,255,255,.14), rgba(255,255,255,.06));
      transition:background .26s ease, box-shadow .26s ease;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.08);
    }

    .album-card:hover .media-shell{
      background:
        linear-gradient(135deg,
          rgba(73, 201, 255, .40) 0%,
          rgba(125, 167, 255, .20) 30%,
          rgba(255,255,255,.10) 52%,
          rgba(255, 188, 87, .28) 100%);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.15),
        0 10px 24px rgba(0,0,0,.12);
    }

    .album-frame{
      position:relative;
      border-radius:15px;
      overflow:hidden;
      background:#e7edf6;
      aspect-ratio:16 / 10;
    }

    .album-frame img{
      position:absolute;
      inset:0;
      height:100%;
      object-fit:var(--cover-fit, cover);
      object-position:var(--cover-position, center center);
      opacity:0;
      transform:scale(1.02);
      transition:opacity .9s ease, transform 4.2s ease;
    }

    .album-frame img.active{
      opacity:1;
      transform:scale(1.07);
    }

    .album-title{
      position:relative;
      z-index:1;
      margin:13px 6px 2px;
      text-align:center;
      font-size:clamp(17px, 1.3vw, 26px);
      line-height:1.15;
      font-weight:900;
      letter-spacing:.4px;
      text-transform:uppercase;
      color:#f4f8ff;
      text-shadow:0 1px 2px rgba(0,0,0,.15);
    }

    .album-desc{
      position:relative;
      z-index:1;
      margin:8px 4px 0;
      text-align:center;
      color:var(--soft);
      font-size:13px;
      line-height:1.45;
      min-height:38px;
    }

    .pager{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
      margin:28px 0 4px;
      user-select:none;
    }

    .arrow,
    .back-btn,
    .pill-btn{
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.12);
      color:#fff;
      cursor:pointer;
      box-shadow:0 10px 22px rgba(0,0,0,.18);
      transition:transform .2s ease, background .2s ease, border-color .2s ease;
    }

    .arrow{
      width:42px;
      height:42px;
      border-radius:50%;
      display:grid;
      place-items:center;
      font-size:20px;
      line-height:1;
      font-weight:900;
    }

    .arrow:hover,
    .back-btn:hover,
    .pill-btn:hover{
      transform:translateY(-3px);
      background:rgba(255,255,255,.18);
      border-color:rgba(255,255,255,.22);
    }

    .page-dots{
      display:flex;
      align-items:center;
      gap:9px;
    }

    .dot{
      width:9px;
      height:9px;
      border-radius:50%;
      background:rgba(255,255,255,.28);
      transition:.2s ease;
      cursor:pointer;
    }

    .dot.active{
      width:26px;
      border-radius:999px;
      background:#fff;
    }

    .detail-head{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      gap:18px;
      margin-bottom:22px;
    }

    .detail-title-wrap{
      display:none;
    }

    .detail-title{
      margin:0;
      font-size:clamp(27px, 3.2vw, 46px);
      line-height:1.12;
      font-weight:900;
      text-transform:uppercase;
    }

    .detail-desc{
      margin:8px 0 0;
      color:#e3edff;
      font-size:15px;
      line-height:1.55;
    }

    .back-btn{
      flex:none;
      border-radius:999px;
      padding:12px 17px;
      font-weight:800;
      font-size:15px;
    }

    .detail-grid{
      display:grid;
      grid-template-columns:repeat(4, minmax(0, 1fr));
      gap:14px;
    }

    .detail-photo{
      position:relative;
      border:0;
      padding:0;
      border-radius:18px;
      overflow:hidden;
      background:rgba(255,255,255,.1);
      cursor:pointer;
      aspect-ratio:1 / 1;
      box-shadow:0 12px 26px rgba(0,0,0,.18);
      transition:transform .2s ease, box-shadow .2s ease;
    }

    .detail-photo:hover{
      transform:translateY(-5px);
      box-shadow:0 18px 36px rgba(0,0,0,.25);
    }

    .detail-photo img{
      width:100%;
      height:100%;
      object-fit:var(--detail-fit, cover);
      object-position:var(--detail-position, center center);
    }

    .loading{
      grid-column:1 / -1;
      text-align:center;
      padding:40px 10px;
      color:#dce8ff;
      font-size:17px;
      font-weight:700;
    }

    .lightbox{
      position:fixed;
      inset:0;
      z-index:1000;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(0,0,0,.82);
      padding:22px;
    }

    .lightbox.active{
      display:flex;
    }

    .lightbox-img{
      max-width:min(1200px, 100%);
      max-height:86vh;
      width:auto;
      border-radius:18px;
      box-shadow:0 22px 70px rgba(0,0,0,.45);
    }

    .lightbox-close,
    .lightbox-nav{
      position:absolute;
      border:0;
      color:#fff;
      background:rgba(255,255,255,.15);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      cursor:pointer;
    }

    .lightbox-close{
      top:18px;
      right:18px;
      width:42px;
      height:42px;
      border-radius:50%;
      font-size:28px;
      line-height:1;
    }

    .lightbox-nav{
      top:50%;
      transform:translateY(-50%);
      width:46px;
      height:58px;
      border-radius:999px;
      font-size:34px;
    }

    .lightbox-prev{left:18px}
    .lightbox-next{right:18px}


    .album-card .album-title,
    #siteName, h1{
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    .socials{
      display:flex;
      justify-content:center;
      gap:14px;
      flex-wrap:wrap;
      margin-top:24px;
    }

    .social{
      min-width:136px;
      padding:14px 18px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.12);
      color:#fff;
      font-weight:800;
      font-size:15px;
      text-align:center;
      box-shadow:0 10px 24px rgba(0,0,0,.18);
      transition:transform .2s ease, background .2s ease;
    }

    .social:hover{
      transform:translateY(-3px);
      background:rgba(255,255,255,.18);
    }


    /* Nhiếp Ảnh Viễn Đông header + Liquid Glass */
    .hero{
      text-align:center;
      margin-bottom:34px;
    }

    .brand-row{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:30px;
      width:min(940px, 100%);
      margin:0 auto;
      padding:10px 0 6px;
    }

    .brand-copy{
      text-align:left;
      min-width:0;
    }

    .logo{
      position:relative;
      flex:none;
      width:150px;
      height:150px;
      border-radius:50%;
      display:grid;
      place-items:center;
      overflow:visible;
      isolation:isolate;
      filter:drop-shadow(0 0 20px rgba(255,255,255,.20));
      transition:transform .35s cubic-bezier(.2,.8,.2,1), filter .35s ease;
    }

    .logo img{
      position:relative;
      z-index:3;
      width:100%;
      height:100%;
      object-fit:contain;
      border-radius:50%;
      transition:transform .35s cubic-bezier(.2,.8,.2,1);
    }

    .liquid-logo::before{
      content:"";
      position:absolute;
      inset:-18px;
      z-index:1;
      border-radius:50%;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,.85), transparent 16%),
        radial-gradient(circle at 75% 35%, rgba(78,205,255,.50), transparent 24%),
        radial-gradient(circle at 45% 82%, rgba(255,204,76,.38), transparent 25%);
      opacity:0;
      filter:blur(18px);
      transform:scale(.82) rotate(0deg);
      transition:opacity .35s ease, transform .55s ease;
    }

    .liquid-logo::after{
      content:"";
      position:absolute;
      inset:-8px;
      z-index:2;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.24);
      background:
        linear-gradient(135deg, rgba(255,255,255,.22), rgba(255,255,255,.03) 42%, rgba(255,255,255,.18)),
        radial-gradient(circle at 24% 18%, rgba(255,255,255,.45), transparent 18%),
        radial-gradient(circle at 78% 82%, rgba(73,201,255,.26), transparent 30%);
      backdrop-filter:blur(14px) saturate(170%);
      -webkit-backdrop-filter:blur(14px) saturate(170%);
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,.38),
        inset 0 -12px 28px rgba(255,255,255,.06),
        0 0 0 1px rgba(255,255,255,.08),
        0 18px 42px rgba(0,0,0,.22);
      opacity:0;
      transform:scale(.92);
      transition:opacity .35s ease, transform .35s ease;
      pointer-events:none;
    }

    .liquid-logo:hover,
    .liquid-logo.logo-hover{
      transform:translateY(-5px) scale(1.035);
      filter:
        drop-shadow(0 0 16px rgba(255,255,255,.44))
        drop-shadow(0 0 28px rgba(64,196,255,.30));
    }

    .liquid-logo:hover img,
    .liquid-logo.logo-hover img{
      transform:scale(1.04) rotate(-2deg);
    }

    .liquid-logo:hover::before,
    .liquid-logo.logo-hover::before{
      opacity:1;
      transform:scale(1.08) rotate(18deg);
      animation:liquidPulse 2.8s ease-in-out infinite;
    }

    .liquid-logo:hover::after,
    .liquid-logo.logo-hover::after{
      opacity:1;
      transform:scale(1.03);
    }

    @keyframes liquidPulse{
      0%,100%{filter:blur(18px); opacity:.72}
      50%{filter:blur(24px); opacity:1}
    }

    h1{
      margin:0;
      font-size:clamp(38px, 5.1vw, 76px);
      line-height:.98;
      letter-spacing:1.5px;
      font-weight:900;
      text-transform:uppercase;
      color:#fff;
      text-shadow:0 4px 28px rgba(0,0,0,.23);
    }

    .sub{
      margin:14px 0 0;
      color:#e8f0ff;
      font-size:clamp(15px, 1.35vw, 23px);
      font-weight:700;
      letter-spacing:.2px;
    }

    .album-card{
      background:
        linear-gradient(150deg, rgba(255,255,255,.20), rgba(255,255,255,.07) 36%, rgba(255,255,255,.13)),
        linear-gradient(180deg, rgba(87,112,151,.78), rgba(57,82,121,.86));
      backdrop-filter:blur(22px) saturate(165%);
      -webkit-backdrop-filter:blur(22px) saturate(165%);
    }

    .album-card::after{
      content:"";
      position:absolute;
      left:16px;
      right:16px;
      top:14px;
      height:34%;
      border-radius:22px 22px 60% 60%;
      background:linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,0));
      opacity:.58;
      pointer-events:none;
      z-index:0;
    }

    .album-card:hover{
      background:
        linear-gradient(135deg, rgba(255,255,255,.24), rgba(255,255,255,.08) 32%, rgba(255,255,255,.16)),
        linear-gradient(160deg, rgba(69,104,150,.90), rgba(57,88,133,.88) 48%, rgba(74,96,141,.92));
    }

    .media-shell{
      background:
        linear-gradient(135deg, rgba(255,255,255,.24), rgba(255,255,255,.08) 45%, rgba(255,255,255,.18));
      backdrop-filter:blur(12px) saturate(155%);
      -webkit-backdrop-filter:blur(12px) saturate(155%);
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,.35),
        inset 0 -16px 28px rgba(255,255,255,.04),
        inset 0 0 0 1px rgba(255,255,255,.12);
    }

    .album-card:hover .media-shell{
      background:
        linear-gradient(135deg,
          rgba(255,255,255,.34) 0%,
          rgba(73, 201, 255, .36) 24%,
          rgba(255,255,255,.10) 52%,
          rgba(255, 188, 87, .30) 100%);
    }



    /* Elastic hover + premium glow */
    @keyframes elasticCard {
      0% { transform: translateY(0) scale(1, 1); }
      34% { transform: translateY(-7px) scale(1.014, .986); }
      56% { transform: translateY(-5px) scale(.992, 1.008); }
      78% { transform: translateY(-6px) scale(1.006, .997); }
      100% { transform: translateY(-6px) scale(1.004, 1); }
    }

    @keyframes elasticButton {
      0% { transform: translateY(0) scale(1, 1); }
      36% { transform: translateY(-4px) scale(1.038, .965); }
      62% { transform: translateY(-3px) scale(.986, 1.014); }
      82% { transform: translateY(-3px) scale(1.012, .995); }
      100% { transform: translateY(-3px) scale(1.006, 1); }
    }

    @keyframes auroraBorder {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    @keyframes shimmerSweep {
      0% { transform: translateX(-140%) rotate(18deg); opacity:0; }
      22% { opacity:.95; }
      100% { transform: translateX(180%) rotate(18deg); opacity:0; }
    }

    .album-card{
      transform-origin:center bottom;
    }

    .album-card:hover{
      animation:elasticCard .78s cubic-bezier(.23,.92,.28,1) both;
      box-shadow:
        0 24px 56px rgba(0,0,0,.36),
        0 0 0 1px rgba(255,255,255,.16),
        0 0 34px rgba(64,196,255,.16);
    }

    .album-card::after{
      background:
        linear-gradient(90deg,
          transparent,
          rgba(255,255,255,.28),
          rgba(98,211,255,.20),
          transparent);
      width:42%;
      height:145%;
      left:-58%;
      right:auto;
      top:-22%;
      border-radius:999px;
      transform:rotate(18deg);
      opacity:0;
      z-index:2;
    }

    .album-card:hover::after{
      animation:shimmerSweep .95s ease;
    }

    .album-card .media-shell{
      position:relative;
      overflow:hidden;
    }

    .album-card .media-shell::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      padding:1px;
      background:linear-gradient(135deg,
        rgba(255,255,255,.0),
        rgba(78,205,255,.65),
        rgba(255,211,97,.55),
        rgba(255,255,255,.0));
      background-size:220% 220%;
      opacity:0;
      transition:opacity .28s ease;
      pointer-events:none;
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite:xor;
      mask-composite:exclude;
      z-index:4;
    }

    .album-card:hover .media-shell::before{
      opacity:1;
      animation:auroraBorder 2.4s ease infinite;
    }

    .album-card:hover .album-title{
      text-shadow:
        0 2px 6px rgba(0,0,0,.20),
        0 0 18px rgba(255,255,255,.28),
        0 0 24px rgba(78,205,255,.22);
    }

    .social{
      position:relative;
      overflow:hidden;
      isolation:isolate;
      background:
        linear-gradient(135deg, rgba(255,255,255,.17), rgba(255,255,255,.08)),
        rgba(255,255,255,.12);
      backdrop-filter:blur(14px) saturate(160%);
      -webkit-backdrop-filter:blur(14px) saturate(160%);
    }

    .social::before{
      content:"";
      position:absolute;
      inset:-2px;
      z-index:-1;
      border-radius:inherit;
      background:linear-gradient(120deg,
        rgba(66,202,255,.75),
        rgba(255,203,78,.62),
        rgba(255,255,255,.35),
        rgba(66,202,255,.75));
      background-size:220% 220%;
      opacity:0;
      transition:opacity .25s ease;
    }

    .social::after{
      content:"";
      position:absolute;
      top:-70%;
      left:-45%;
      width:38%;
      height:240%;
      transform:rotate(18deg);
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.58), transparent);
      opacity:0;
      pointer-events:none;
    }

    .social:hover{
      animation:elasticButton .66s cubic-bezier(.23,.92,.28,1) both;
      background:
        linear-gradient(135deg, rgba(255,255,255,.26), rgba(255,255,255,.10)),
        rgba(255,255,255,.16);
      box-shadow:
        0 16px 32px rgba(0,0,0,.26),
        0 0 28px rgba(78,205,255,.20);
    }

    .social:hover::before{
      opacity:.9;
      animation:auroraBorder 2.2s ease infinite;
    }

    .social:hover::after{
      animation:shimmerSweep .82s ease;
    }

    .contact-zalo:hover{
      color:#f7fbff;
    }

    .contact-facebook:hover{
      color:#f7fbff;
    }

    .arrow:hover,
    .back-btn:hover,
    .pill-btn:hover{
      animation:elasticButton .62s cubic-bezier(.23,.92,.28,1) both;
      box-shadow:
        0 14px 30px rgba(0,0,0,.24),
        0 0 24px rgba(78,205,255,.18);
    }

    @media (hover:none){
      .album-card:active{
        transform:scale(.985);
      }

      .social:active,
      .arrow:active,
      .back-btn:active{
        transform:scale(.96);
      }
    }


    @media (max-width: 1080px){
      .wrap{padding:24px 16px 34px}
      .brand-row{gap:22px}
      .logo{width:128px;height:128px}

    .pill-btn,

      will-change: transform, box-shadow;

    .album-card{
      transition:
        transform .52s cubic-bezier(.16, 1, .3, 1),
        box-shadow .52s cubic-bezier(.16, 1, .3, 1),
        background .42s ease,
        border-color .42s ease,
        filter .42s ease;

    .album-card:hover{
      animation: none !important;
      transform: translate3d(0, -7px, 0) scale(1.012, .996);
      filter: saturate(1.05);
    }

    .album-card .media-shell{
      transition:
        transform .58s cubic-bezier(.16, 1, .3, 1),
        background .42s ease,
        box-shadow .42s ease;
    }

    .album-card:hover .media-shell{
      transform: scale(1.01, 1.018);

    .album-card .album-frame img{
      transition:
        opacity .9s ease,
        transform 4.2s ease,
        filter .55s ease;
    }

    .album-card:hover .album-frame img.active{
      filter: contrast(1.035) saturate(1.05);
    }

      transition:
        transform .52s cubic-bezier(.16, 1, .3, 1),

    }

    .social:hover,

      animation: none !important;

    /* Áp dụng cùng cảm giác liquid mượt cho ảnh bên trong album/folder */
    .detail-photo{
      position: relative;
      isolation: isolate;
      overflow: hidden;
      transition:
        transform .48s cubic-bezier(.16, 1, .3, 1),
        box-shadow .48s ease,
        filter .42s ease;
    }

    .detail-photo::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      padding:1px;
      background:linear-gradient(135deg,
        rgba(255,255,255,0),
        rgba(78,205,255,.65),
        rgba(255,210,92,.45),
        rgba(255,255,255,0));
      background-size:220% 220%;
      opacity:0;
      transition:opacity .34s ease;
      pointer-events:none;
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite:xor;
      mask-composite:exclude;
      z-index:3;
    }

    .detail-photo::after{
      content:"";
      position:absolute;
      top:-70%;
      left:-50%;
      width:36%;
      height:240%;
      transform:translateX(-140%) rotate(18deg);
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.46), transparent);
      opacity:0;
      pointer-events:none;
      z-index:4;
    }

    .detail-photo img{
      transition:
        transform .82s cubic-bezier(.16, 1, .3, 1),
        filter .5s ease;
      transform: translateZ(0) scale(1);

    .detail-photo:hover{

      filter: saturate(1.06);

    .logo:not(.logo-ready)::after{

      pointer-events:none !important;
      backdrop-filter:none !important;
      -webkit-backdrop-filter:none !important;

    @keyframes logoLoadingPulse{
      0%,100%{ transform:scale(.94); opacity:.42; box-shadow:0 0 10px rgba(0,220,255,.18); }

    const FEATURED_HOME_ALBUM_IDS = ['anh-the', 'chan-dung', 'phuc-hoi-anh-ai'];

    // Nếu dùng GitHub Pages: dán URL Web App Apps Script dạng .../exec vào đây.
    // Nếu chạy trực tiếp trong Apps Script: giá trị này sẽ bị bỏ qua.
    // Dán link Apps Script /exec vào đây khi up GitHub Pages.
    const API_BASE_URL = 'https://script.google.com/macros/s/AKfycbzIXuRkraZ4ASUc1d-A6wWLqiB5W5Y4CGvUZR96MhX3Y0lvpbup7nbYFqsRVjKlZq15/exec';

    function isAppsScriptRuntime(){
      return !!(window.google && google.script && google.script.run);
    }

    function apiRequest(api, params = {}) {
      return new Promise((resolve, reject) => {
        if (!API_BASE_URL || API_BASE_URL.indexOf('PASTE_APPS_SCRIPT_EXEC_URL_HERE') >= 0) {
          reject(new Error('Chưa dán Apps Script Web App URL vào API_BASE_URL trong index.html'));
          return;
        }

        const callbackName = '__vdJsonp_' + Date.now() + '_' + Math.random().toString(36).slice(2);
        const script = document.createElement('script');

        const query = new URLSearchParams({
          api: api,
          callback: callbackName
        });

        Object.keys(params || {}).forEach((key) => {
          if (params[key] !== undefined && params[key] !== null) {
            query.set(key, params[key]);
          }
        });

        const separator = API_BASE_URL.indexOf('?') >= 0 ? '&' : '?';
        const timeout = setTimeout(() => {
          cleanup();
          reject(new Error('Kết nối API quá lâu, thử tải lại trang.'));
        }, 30000);

        function cleanup() {
          clearTimeout(timeout);
          delete window[callbackName];
          if (script.parentNode) script.parentNode.removeChild(script);
        }

        window[callbackName] = (payload) => {
          cleanup();

          if (!payload || payload.ok === false) {
            reject(new Error(payload && payload.error ? payload.error : 'Lỗi API không xác định'));
            return;
          }

          resolve(payload.data);
        };

        script.onerror = () => {
          cleanup();
          reject(new Error('Không gọi được Apps Script API.'));
        };

        script.src = API_BASE_URL + separator + query.toString();
        document.head.appendChild(script);
      });
    }

    function scriptRunPromise(methodName, ...args){
      return new Promise((resolve, reject) => {
        if (!isAppsScriptRuntime()) {
          reject(new Error('Không chạy trong môi trường Apps Script.'));
          return;
        }

        let runner = google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler((err) => reject(new Error(err && err.message ? err.message : (err || 'Lỗi Apps Script'))));

        runner[methodName](...args);
      });
    }

    function fetchSiteSettings(){
      return isAppsScriptRuntime()
        ? scriptRunPromise('getSiteSettings')
        : apiRequest('siteSettings');
    }

    function normalizeAlbumMeta(album){
      if (!album) return album;

    function fetchAlbums(){
      return (isAppsScriptRuntime()

        : apiRequest('albums'))

    }

    function fetchAlbumImages(albumId){
      return (isAppsScriptRuntime()
        ? scriptRunPromise('getAlbumImages', albumId)
        : apiRequest('albumImages', {albumId}))
        .then((album) => normalizeAlbumMeta(album));
    }

    const state = {

    function updateHomeScale(){
      if (!document.body.classList.contains('home-fit')) return;

      document.body.style.setProperty('--home-scale', '1');

      requestAnimationFrame(() => {
        if (!document.body.classList.contains('home-fit')) return;

        const wrap = document.querySelector('.wrap');

        const rect = wrap.getBoundingClientRect();
        const safeW = Math.max(320, window.innerWidth - 18);

    function ensureCleanLogoReady(){

    function ensureSafeLogoReady(){
      const logoImg = document.getElementById('siteLogo');
      const logoWrap = document.getElementById('siteLogoWrap');

        logoWrap.classList.add('logo-ready');

      }, 900);
    }


    function setupLogoCanvasSweep(){
      const logoImg = document.getElementById('siteLogo');
      const canvas = document.getElementById('siteLogoSweepCanvas');
      const wrap = document.getElementById('siteLogoWrap');
      if (!logoImg || !canvas || !wrap) return;

      const ctx = canvas.getContext('2d');
      if (!ctx) return;

      let rafId = 0;
      let startAt = 0;
      const period = 5300;
      const duration = 1250;
      const firstDelay = 650;

      function resizeCanvas(){
        const rect = wrap.getBoundingClientRect();
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const cssW = Math.max(1, rect.width);
        const cssH = Math.max(1, rect.height);
        const pxW = Math.max(1, Math.round(cssW * dpr));
        const pxH = Math.max(1, Math.round(cssH * dpr));

        if (canvas.width !== pxW || canvas.height !== pxH) {
          canvas.width = pxW;
          canvas.height = pxH;
          canvas.style.width = cssW + 'px';
          canvas.style.height = cssH + 'px';
        }

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        return {w: cssW, h: cssH};
      }

      function getContainRect(w, h){
        const iw = logoImg.naturalWidth || w;
        const ih = logoImg.naturalHeight || h;
        const scale = Math.min(w / iw, h / ih);
        const dw = iw * scale;
        const dh = ih * scale;
        return {
          x: (w - dw) / 2,
          y: (h - dh) / 2,
          w: dw,
          h: dh
        };
      }

      function draw(now){
        const size = resizeCanvas();
        const w = size.w;
        const h = size.h;

        ctx.clearRect(0, 0, w, h);

        const elapsed = now - startAt;
        if (elapsed >= 0) {
          const cycle = elapsed % period;

          if (cycle <= duration) {
            const phase = cycle / duration;
            const r = getContainRect(w, h);

            // Tạo mask alpha bằng chính logo.
            ctx.save();
            ctx.globalAlpha = 1;
            ctx.drawImage(logoImg, r.x, r.y, r.w, r.h);

            // Chỉ giữ ánh sáng bên trong alpha của logo.
            ctx.globalCompositeOperation = 'source-in';

            const x = -w * 0.65 + phase * w * 2.25;
            const band = Math.max(72, w * 0.34);
            const gradient = ctx.createLinearGradient(x - band, 0, x + band, h);

            gradient.addColorStop(0.00, 'rgba(255,255,255,0)');
            gradient.addColorStop(0.22, 'rgba(255,255,255,0)');
            gradient.addColorStop(0.38, 'rgba(255,255,255,0.30)');
            gradient.addColorStop(0.50, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.60, 'rgba(150,235,255,0.58)');
            gradient.addColorStop(0.78, 'rgba(255,255,255,0)');
            gradient.addColorStop(1.00, 'rgba(255,255,255,0)');

            ctx.globalAlpha = 1;
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, w, h);

            // Một lớp mềm rất nhẹ để viền sáng không bén.
            ctx.globalAlpha = 0.32;
            ctx.filter = 'blur(10px)';
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, w, h);

            ctx.restore();
          }
        }

        rafId = requestAnimationFrame(draw);
      }

      function start(){
        if (!logoImg.complete || !logoImg.naturalWidth) return;
        if (rafId) cancelAnimationFrame(rafId);
        startAt = performance.now() + firstDelay;
        rafId = requestAnimationFrame(draw);
      }

      logoImg.addEventListener('load', start, {passive:true});
      window.addEventListener('resize', start, {passive:true});
      window.addEventListener('orientationchange', () => setTimeout(start, 240), {passive:true});

      if (logoImg.complete && logoImg.naturalWidth) {
        setTimeout(start, 80);
      }
    }



    function setupPhoneDialLink(){
      const phoneLink = document.querySelector('.contact-phone');
      if (!phoneLink) return;

      const phoneNumber = phoneLink.getAttribute('data-phone') || '0989017704';
      phoneLink.setAttribute('href', 'tel:' + phoneNumber);

      // Web không thể ép 100% thiết bị dùng đúng SIM/default dialer nếu hệ điều hành yêu cầu chọn.
      // Đây là cách mở app gọi điện chuẩn nhất có thể từ trình duyệt.
      phoneLink.addEventListener('click', (event) => {
        const isAndroid = /Android/i.test(navigator.userAgent || '');
        if (!isAndroid) return;

        event.preventDefault();
        window.location.href = 'tel:' + phoneNumber;
      }, {passive:false});
    }


document.addEventListener('DOMContentLoaded', () => {
      ensureSafeLogoReady();
      ensureCleanLogoReady();
      setupLogoCanvasSweep();
      setupPhoneDialLink();
      document.querySelectorAll('.social-address').forEach((el) => {
        el.textContent = 'Đ/C: 13 Lê Hồng Phong, phường Phan Thiết, tỉnh Lâm Đồng.';
      });

      const logoImg = document.getElementById('siteLogo');
      const logoReadyWrap = document.getElementById('siteLogoWrap');
      if (logoImg && logoReadyWrap) {
        logoImg.alt = '';
        logoImg.addEventListener('load', () => logoReadyWrap.classList.add('logo-ready'), {once:true});
        logoImg.addEventListener('error', () => logoReadyWrap.classList.add('logo-ready'), {once:true});
        if (logoImg.complete && logoImg.getAttribute('src')) {
          logoReadyWrap.classList.add('logo-ready');
        }
        setTimeout(() => logoReadyWrap.classList.add('logo-ready'), 1200);
      }

      setHomeFitMode(true);
      window.addEventListener('resize', updateHomeScale, {passive:true});
      window.addEventListener('orientationchange', () => setTimeout(updateHomeScale, 220), {passive:true});

      loadSiteSettings();
      loadAlbums();

      document.getElementById('prevPage').addEventListener('click', () => showAlbumPage(state.currentPage - 1));
      document.getElementById('nextPage').addEventListener('click', () => showAlbumPage(state.currentPage + 1));
      document.getElementById('backHome').addEventListener('click', showHome);

      document.getElementById('lightboxClose').addEventListener('click', closeLightbox);
      document.getElementById('lightboxPrev').addEventListener('click', () => stepLightbox(-1));
      document.getElementById('lightboxNext').addEventListener('click', () => stepLightbox(1));
      document.getElementById('lightbox').addEventListener('click', (event) => {
        if (event.target.id === 'lightbox') closeLightbox();
      });

      document.getElementById('compareClose').addEventListener('click', closeCompareLightbox);
      document.getElementById('comparePrev').addEventListener('click', () => stepCompareLightbox(-1));
      document.getElementById('compareNext').addEventListener('click', () => stepCompareLightbox(1));
      document.getElementById('compareLightbox').addEventListener('click', (event) => {
        if (event.target.id === 'compareLightbox') closeCompareLightbox();
      });

      document.getElementById('compareRange').addEventListener('input', (event) => {
        document.getElementById('compareSlider').style.setProperty('--pos', event.target.value + '%');
      });



      enableSwipeNavigation(document.getElementById('lightbox'), stepLightbox);
      enableSwipeNavigation(document.getElementById('compareLightbox'), stepCompareLightbox);

      const logoWrap = document.getElementById('siteLogoWrap');
      if (logoWrap) {
        logoWrap.addEventListener('touchstart', () => {
          logoWrap.classList.add('logo-hover');
          clearTimeout(window.__logoTouchTimer);
          window.__logoTouchTimer = setTimeout(() => logoWrap.classList.remove('logo-hover'), 1200);
        }, {passive: true});
      }

      document.addEventListener('keydown', (event) => {
        const normalLightboxActive = document.getElementById('lightbox').classList.contains('active');
        const compareLightboxActive = document.getElementById('compareLightbox').classList.contains('active');

        if (!normalLightboxActive && !compareLightboxActive) return;

        if (event.key === 'Escape') {
          closeLightbox();
          closeCompareLightbox();
        }

        if (event.key === 'ArrowLeft') {
          normalLightboxActive ? stepLightbox(-1) : stepCompareLightbox(-1);
        }

        if (event.key === 'ArrowRight') {
          normalLightboxActive ? stepLightbox(1) : stepCompareLightbox(1);
        }
      });
    });

    function cssUrlValue(url){
      return 'url(' + JSON.stringify(String(url || '')) + ')';
    }

    function setMainBackgroundValue(value){
      document.documentElement.style.setProperty('--main-bg-image', value);
      document.body.style.setProperty('--main-bg-image', value);

      const siteBox = document.querySelector('.site-box');
      if (siteBox) {
        siteBox.style.setProperty('--main-bg-image', value);
      }
    }

    function applySiteBackground(url){
      const bgUrl = String(url || '').trim();

      if (!bgUrl) {
        setMainBackgroundValue('none');
        document.documentElement.classList.remove('has-drive-bg');
        document.body.classList.remove('has-drive-bg');
        return;
      }

      const cssValue = cssUrlValue(bgUrl);
      const img = new Image();
      img.referrerPolicy = 'no-referrer';

      const applyNow = () => {
        setMainBackgroundValue(cssValue);
        document.documentElement.classList.add('has-drive-bg');
        document.body.classList.add('has-drive-bg');
      };

      img.onload = applyNow;
      img.onerror = applyNow;
      img.src = bgUrl;
    }

    function loadSiteSettings(){
      fetchSiteSettings()
        .then((settings) => {
          if (!settings) return;
          document.title = settings.name || 'Nhiếp Ảnh Viễn Đông';
          document.getElementById('siteName').textContent = settings.name || 'NHIẾP ẢNH VIỄN ĐÔNG';
          document.getElementById('siteSubtitle').textContent = settings.subtitle || '';
          applySiteBackground(settings.backgroundImageUrl || settings.backgroundUrl || settings.backgroundUrlAlt || '');
          if (settings.logoDataUri) {
            const logoUrl = String(settings.logoDataUri);
            document.getElementById('siteLogo').src =
              logoUrl.indexOf('data:') === 0
                ? logoUrl
                : logoUrl + (logoUrl.indexOf('?') >= 0 ? '&' : '?') + 'v=' + Date.now();
          }
})
        .catch(() => {});
    }

    function loadAlbums(){
      fetchAlbums()
        .then((albums) => {
          const allAlbums = albums || [];
          const albumMap = new Map(allAlbums.map((album) => [album.id, album]));
          state.albums = FEATURED_HOME_ALBUM_IDS
            .map((id) => albumMap.get(id))
            .filter(Boolean);

          if (!state.albums.length) {
            state.albums = allAlbums.slice(0, 3);
          }

          renderAlbumPages(state.albums);
        })
        .catch((err) => {
          document.getElementById('albumPages').innerHTML =
            `<div class="loading">Lỗi tải album: ${escapeHtml(err.message || err)}</div>`;
        });
    }

    function renderAlbumPages(albums){
      clearSlideTimers();

      const pagesWrap = document.getElementById('albumPages');
      const dotsWrap = document.getElementById('pageDots');
      pagesWrap.innerHTML = '';
      dotsWrap.innerHTML = '';

      const pageSize = 3;
      const pageCount = Math.max(1, Math.ceil(albums.length / pageSize));
      document.getElementById('albumPager').style.display = pageCount > 1 ? 'flex' : 'none';

      for (let pageIndex = 0; pageIndex < pageCount; pageIndex++) {
        const page = document.createElement('section');
        page.className = 'album-page';
        if (pageIndex === 0) page.classList.add('active');

        albums.slice(pageIndex * pageSize, pageIndex * pageSize + pageSize).forEach((album) => {
          page.appendChild(createAlbumCard(album));
        });

        pagesWrap.appendChild(page);

        const dot = document.createElement('span');
        dot.className = 'dot';
        if (pageIndex === 0) dot.classList.add('active');
        dot.addEventListener('click', () => showAlbumPage(pageIndex));
        dotsWrap.appendChild(dot);
      }

      state.currentPage = 0;
      startCoverSlides();
      requestAnimationFrame(updateHomeScale);
    }

    function createAlbumCard(album){
      const card = document.createElement('article');
      card.className = 'album-card';
      card.dataset.album = album.id;
      card.style.setProperty('--cover-fit', album.coverFit || 'cover');
      card.style.setProperty('--cover-position', album.coverPosition || 'center center');

      const images = album.coverImages && album.coverImages.length
        ? album.coverImages
        : [];

      card.innerHTML = `
        <span class="sharp-border"></span>
        <div class="media-shell">
          <div class="album-frame">
            ${images.map((img, index) => `
              <img class="${index === 0 ? 'active' : ''}" src="${escapeAttr(img.thumbUrl)}" alt="${escapeAttr(album.title)}" style="object-fit:${escapeAttr(album.coverFit || 'cover')};object-position:${escapeAttr(album.coverPosition || 'center top')};transform-origin:center top;">
            `).join('')}
          </div>
        </div>
        <div class="album-title">${escapeHtml(album.title)}</div>
        <div class="album-desc">${escapeHtml(album.desc || '')}</div>
      `;

      card.addEventListener('click', () => openAlbum(album.id));
      return card;
    }

    function startCoverSlides(){
      clearSlideTimers();

      document.querySelectorAll('.album-card').forEach((card, cardIndex) => {
        const images = Array.from(card.querySelectorAll('.album-frame img'));
        if (images.length <= 1) return;

        let index = 0;
        const timer = setInterval(() => {
          images[index].classList.remove('active');
          index = (index + 1) % images.length;
          images[index].classList.add('active');
        }, 2600 + (cardIndex % 6) * 160);

        state.slideTimers.push(timer);
      });
    }

    function clearSlideTimers(){
      state.slideTimers.forEach((timer) => clearInterval(timer));
      state.slideTimers = [];
    }

    function showAlbumPage(index){
      const pages = Array.from(document.querySelectorAll('.album-page'));
      const dots = Array.from(document.querySelectorAll('.dot'));
      if (!pages.length) return;

      state.currentPage = (index + pages.length) % pages.length;
      pages.forEach((page, i) => page.classList.toggle('active', i === state.currentPage));
      dots.forEach((dot, i) => dot.classList.toggle('active', i === state.currentPage));
    }

    function openAlbum(albumId){
      const albumMeta = state.albums.find((album) => album.id === albumId);
      setHomeFitMode(false);
      document.getElementById('homeView').classList.remove('active');
      document.getElementById('detailView').classList.add('active');
      document.getElementById('detailTitle').textContent = albumMeta ? albumMeta.title : 'Album';
      document.getElementById('detailDesc').textContent = '';
      document.getElementById('detailGrid').innerHTML = `<div class="loading loading-anim loading-dots" aria-label="Đang tải nội dung">
            <div class="dots-loader" aria-hidden="true">
              <span class="dot-loader d1"></span>
              <span class="dot-loader d2"></span>
              <span class="dot-loader d3"></span>
              <span class="dot-loader d4"></span>
              <span class="dot-loader d5"></span>
            </div>
          </div>`;
      window.scrollTo({top: 0, behavior: 'smooth'});

      fetchAlbumImages(albumId)
        .then(renderAlbumDetail)
        .catch((err) => {
          document.getElementById('detailGrid').innerHTML =
            `<div class="loading">Lỗi tải ảnh: ${escapeHtml(err.message || err)}</div>`;
        });
    }

    function renderAlbumDetail(album){
      document.getElementById('detailTitle').textContent = album.title;
      document.getElementById('detailDesc').textContent = '';

      const grid = document.getElementById('detailGrid');
      const images = album.images || [];
      const beforeAfterPairs = album.beforeAfterPairs || [];
      state.currentLightboxImages = images;
      state.currentDetailFit = album.detailFit || 'cover';
      state.currentDetailPosition = album.detailPosition || 'center center';
      grid.style.setProperty('--detail-fit', state.currentDetailFit);
      grid.style.setProperty('--detail-position', state.currentDetailPosition);
      grid.classList.remove('compare-mode');

      if (album.type === 'beforeAfter' && album.id !== 'phuc-hoi-anh-ai') {
        renderBeforeAfterDetail(album, beforeAfterPairs, images);
        return;
      }

      if (!images.length) {
        grid.innerHTML = '<div class="loading">Album này chưa có ảnh.</div>';
        return;
      }

      grid.innerHTML = '';
      images.forEach((img, index) => {
        const button = document.createElement('button');
        button.className = 'detail-photo';
        button.type = 'button';
        button.innerHTML = `<img src="${escapeAttr(img.thumbUrl)}" alt="${escapeAttr(img.name || album.title)}" loading="lazy" style="object-fit:${escapeAttr(album.detailFit || 'cover')};object-position:${escapeAttr(album.detailPosition || 'center top')};">`;
        button.addEventListener('click', () => openLightbox(index));
        grid.appendChild(button);
      });
    }

    function renderBeforeAfterDetail(album, pairs, fallbackImages){
      const grid = document.getElementById('detailGrid');
      grid.innerHTML = '';
      grid.classList.remove('compare-mode');

      state.currentComparePairs = pairs || [];
      state.currentCompareIndex = 0;

      if (!pairs.length) {
        grid.innerHTML = `
          <div class="loading">
            Chưa tìm thấy cặp ảnh trước/sau.<br>
            Đặt tên ảnh theo mẫu: 001_before.jpg và 001_after.jpg
          </div>
        `;

        if (fallbackImages && fallbackImages.length) {
          fallbackImages.forEach((img, index) => {
            const button = document.createElement('button');
            button.className = 'detail-photo';
            button.type = 'button';
            button.innerHTML = `<img src="${escapeAttr(img.thumbUrl)}" alt="${escapeAttr(img.name || album.title)}" loading="lazy" style="object-fit:${escapeAttr(album.detailFit || 'cover')};object-position:${escapeAttr(album.detailPosition || 'center top')};">`;
            button.addEventListener('click', () => openLightbox(index));
            grid.appendChild(button);
          });
        }

        return;
      }

      pairs.forEach((pair, index) => {
        const button = document.createElement('button');
        button.className = 'detail-photo';
        button.type = 'button';
        button.innerHTML = `<img src="${escapeAttr(pair.after.thumbUrl)}" alt="${escapeAttr(pair.label || album.title)}" loading="lazy">`;
        button.addEventListener('click', () => openCompareLightbox(index));
        grid.appendChild(button);
      });
    }

    function showHome(){
      document.getElementById('detailView').classList.remove('active');
      document.getElementById('homeView').classList.add('active');
      setHomeFitMode(true);
      closeLightbox();
      closeCompareLightbox();
      window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function openLightbox(index){
      if (!state.currentLightboxImages.length) return;
      state.currentLightboxIndex = index;
      document.getElementById('lightbox').classList.add('active');
      updateLightboxImage(0);
    }

    function closeLightbox(){
      document.getElementById('lightbox').classList.remove('active');
      state.lightboxLoadToken++;
      const img = document.getElementById('lightboxImg');
      img.src = '';
      img.classList.remove('anim-open', 'anim-next', 'anim-prev', 'is-loading', 'is-waiting');
    }

    function stepLightbox(step){
      const total = state.currentLightboxImages.length;
      if (!total) return;

      const nextIndex = (state.currentLightboxIndex + step + total) % total;
      state.currentLightboxIndex = nextIndex;
      updateLightboxImage(step);
    }

    function updateLightboxImage(direction){
      const imgData = state.currentLightboxImages[state.currentLightboxIndex];
      const imgEl = document.getElementById('lightboxImg');
      const nextSrc = imgData.fullUrl || imgData.thumbUrl;
      const token = ++state.lightboxLoadToken;

      imgEl.classList.add('is-waiting');

      preloadImage(nextSrc)
        .then(() => {
          if (token !== state.lightboxLoadToken) return;

          imgEl.classList.remove('is-waiting', 'is-loading');
          imgEl.src = nextSrc;
          imgEl.alt = imgData.name || '';
          playPhotoTransition(imgEl, direction);
        })
        .catch(() => {
          if (token !== state.lightboxLoadToken) return;

          imgEl.classList.remove('is-waiting');
          imgEl.src = nextSrc;
          imgEl.alt = imgData.name || '';
          playPhotoTransition(imgEl, direction);
        });
    }

    function playPhotoTransition(element, direction){
      const className = direction > 0 ? 'anim-next' : direction < 0 ? 'anim-prev' : 'anim-open';
      element.classList.remove('anim-open', 'anim-next', 'anim-prev');
      void element.offsetWidth;
      element.classList.add(className);
    }

    function preloadImage(src){
      return new Promise((resolve, reject) => {
        if (!src) {
          reject(new Error('Missing image source'));
          return;
        }

        const img = new Image();
        img.onload = () => resolve(src);
        img.onerror = reject;
        img.src = src;
      });
    }


    function openCompareLightbox(index){
      if (!state.currentComparePairs.length) return;
      state.currentCompareIndex = index;
      document.getElementById('compareLightbox').classList.add('active');
      updateCompareLightbox(0);
    }

    function closeCompareLightbox(){
      const el = document.getElementById('compareLightbox');
      if (!el) return;
      el.classList.remove('active');
      state.compareLoadToken++;
      document.getElementById('compareBeforeImg').src = '';
      document.getElementById('compareAfterImg').src = '';
      const stage = document.querySelector('.compare-stage');
      if (stage) stage.classList.remove('anim-open', 'anim-next', 'anim-prev', 'is-loading', 'is-waiting');
    }

    function stepCompareLightbox(step){
      const total = state.currentComparePairs.length;
      if (!total) return;

      state.currentCompareIndex = (state.currentCompareIndex + step + total) % total;
      updateCompareLightbox(step);
    }

    function updateCompareLightbox(direction){
      const pair = state.currentComparePairs[state.currentCompareIndex];
      if (!pair) return;

      const beforeImg = document.getElementById('compareBeforeImg');
      const afterImg = document.getElementById('compareAfterImg');
      const stage = document.querySelector('.compare-stage');
      const beforeSrc = pair.before.fullUrl || pair.before.thumbUrl;
      const afterSrc = pair.after.fullUrl || pair.after.thumbUrl;
      const token = ++state.compareLoadToken;

      if (stage) stage.classList.add('is-waiting');

      Promise.all([
        preloadImage(beforeSrc),
        preloadImage(afterSrc)
      ])
        .then(() => {
          if (token !== state.compareLoadToken) return;

          beforeImg.src = beforeSrc;
          afterImg.src = afterSrc;

          document.getElementById('compareRange').value = 50;
          document.getElementById('compareSlider').style.setProperty('--pos', '50%');

          if (stage) {
            stage.classList.remove('is-waiting', 'is-loading');
            playPhotoTransition(stage, direction);
          }
        })
        .catch(() => {
          if (token !== state.compareLoadToken) return;

          beforeImg.src = beforeSrc;
          afterImg.src = afterSrc;

          document.getElementById('compareRange').value = 50;
          document.getElementById('compareSlider').style.setProperty('--pos', '50%');

          if (stage) {
            stage.classList.remove('is-waiting');
            playPhotoTransition(stage, direction);
          }
        });
    }


    function enableSwipeNavigation(element, stepHandler){
      if (!element) return;

      let startX = 0;
      let startY = 0;
      let tracking = false;

      element.addEventListener('touchstart', (event) => {
        if (!event.touches || !event.touches.length) return;
        startX = event.touches[0].clientX;
        startY = event.touches[0].clientY;
        tracking = true;
      }, {passive:true});

      element.addEventListener('touchend', (event) => {
        if (!tracking || !event.changedTouches || !event.changedTouches.length) return;

        const dx = event.changedTouches[0].clientX - startX;
        const dy = event.changedTouches[0].clientY - startY;
        tracking = false;

        if (Math.abs(dx) < 48 || Math.abs(dx) < Math.abs(dy) * 1.25) return;

        if (dx < 0) {
          stepHandler(1);
        } else {
          stepHandler(-1);
        }
      }, {passive:true});
    }

    function escapeHtml(value){
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeAttr(value){
      return escapeHtml(value);
    }
  </script>
</body>
